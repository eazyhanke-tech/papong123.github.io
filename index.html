<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Topup - Smooth Switch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background: #0b0e14;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            margin: 40px 0;
            text-align: center;
        }

        /* เมนูเลือกเกม */
        .game-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }

        .nav-btn {
            background: #1a1f26;
            color: #888;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: #e94560;
            color: #fff;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }

        /* พื้นที่แสดงตาราง */
        .content-area {
            width: 90%;
            max-width: 600px;
            position: relative;
        }

        .price-card {
            background: #161b22;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            
            /* อนิเมชั่นเริ่มต้น */
            opacity: 0;
            transform: translateY(30px);
            display: none;
        }

        /* อนิเมชั่นขาขึ้น (Active) */
        .price-card.show {
            display: block;
            animation: slideIn 0.5s ease forwards;
        }

        /* อนิเมชั่นขาลง (Exit) */
        .price-card.hide {
            display: block;
            animation: slideOut 0.4s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-40px); }
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: #e94560;
            padding-bottom: 15px;
            border-bottom: 1px solid #30363d;
        }

        td {
            padding: 15px 0;
            border-bottom: 1px solid #21262d;
        }

        .buy-btn {
            background: #238636;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
        }

        .buy-btn:hover { background: #2ea043; }

    </style>
</head>
<body>

    <header>
        <h1>GG TOPUP</h1>
        <p>สลับเลือกแพ็คเกจที่คุณต้องการ</p>
    </header>

    <div class="game-nav">
        <button class="nav-btn" onclick="switchGame('VALORANT', this)">VALORANT</button>
        <button class="nav-btn" onclick="switchGame('ROV', this)">ROV</button>
        <button class="nav-btn" onclick="switchGame('FF', this)">FREE FIRE</button>
    </div>

    <div class="content-area">
        <div id="price-card" class="price-card">
            <h2 id="game-title">Game Title</h2>
            <table>
                <thead>
                    <tr>
                        <th>แพ็คเกจ</th>
                        <th style="text-align: right;">ราคา</th>
                    </tr>
                </thead>
                <tbody id="price-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const data = {
            'VALORANT': [{n: '500 VP', p: '150.-'}, {n: '1000 VP', p: '300.-'}],
            'ROV': [{n: '20 คูปอง', p: '15.-'}, {n: '100 คูปอง', p: '75.-'}],
            'FF': [{n: '100 Diamonds', p: '35.-'}, {n: '500 Diamonds', p: '160.-'}]
        };

        let currentGame = '';

        function switchGame(game, btn) {
            if (currentGame === game) return; // ถ้ากดซ้ำเกมเดิมไม่ต้องทำอะไร
            
            const card = document.getElementById('price-card');
            
            // 1. จัดการปุ่ม Active
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // 2. ถ้ามีหน้าเปิดอยู่ ให้ทำอนิเมชั่นออก
            if (currentGame !== '') {
                card.classList.remove('show');
                card.classList.add('hide');
                
                // รอให้อนิเมชั่นออกจบ (400ms) แล้วค่อยเปลี่ยนข้อมูลและเอาหน้าใหม่ขึ้นมา
                setTimeout(() => {
                    renderData(game);
                    card.classList.remove('hide');
                    card.classList.add('show');
                }, 400);
            } else {
                // ครั้งแรกที่กด
                renderData(game);
                card.classList.add('show');
            }

            currentGame = game;
        }

        function renderData(game) {
            document.getElementById('game-title').innerText = game;
            const list = document.getElementById('price-list');
            list.innerHTML = '';
            data[game].forEach(item => {
                list.innerHTML += `
                    <tr>
                        <td>${item.n}</td>
                        <td style="text-align: right;">
                            <span style="margin-right:15px; font-weight:bold;">${item.p}</span>
                            <button class="buy-btn">ซื้อ</button>
                        </td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
