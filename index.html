<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Topup Store | Animation Edition</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }

        /* ปุ่มเลือกเกม */
        .game-selection {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        .game-btn {
            background: rgba(22, 33, 62, 0.7);
            color: #fff;
            border: 1px solid #e94560;
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-btn:hover {
            background: #e94560;
            transform: scale(1.1);
            box-shadow: 0 0 15px #e94560;
        }

        /* Container สำหรับตารางที่ใช้ทำ Animation */
        .table-wrapper {
            width: 100%;
            max-width: 700px;
            perspective: 1000px;
        }

        .price-table-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none; /* เริ่มต้นซ่อนไว้ */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* คลาสสำหรับ Animation ขาขึ้น (โผล่มา) */
        .slide-up {
            display: block !important;
            animation: slideInUp 0.6s ease forwards;
        }

        /* คลาสสำหรับ Animation ขาลง (หายไป) */
        .slide-down {
            animation: slideOutDown 0.4s ease forwards;
        }

        @keyframes slideInUp {
            0% { opacity: 0; transform: translateY(100px) rotateX(-15deg); }
            100% { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        @keyframes slideOutDown {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(100px); }
        }

        h2 { text-align: center; color: #00d2ff; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #e94560;
            padding: 15px;
            border-radius: 10px 10px 0 0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .buy-btn {
            background: #00d2ff;
            border: none;
            padding: 7px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover { background: #fff; color: #000; }

    </style>
</head>
<body>

    <header>
        <h1>TOPUP SHOP</h1>
        <p>เลือกเกมเพื่อดูราคาแพ็คเกจ</p>
    </header>

    <div class="game-selection">
        <button class="game-btn" onclick="updateView('VALORANT')">VALORANT</button>
        <button class="game-btn" onclick="updateView('ROV')">ROV</button>
        <button class="game-btn" onclick="updateView('FREE FIRE')">FREE FIRE</button>
    </div>

    <div class="table-wrapper">
        <section id="price-section" class="price-table-container">
            <h2 id="selected-game-title">ตารางราคา</h2>
            <table>
                <thead>
                    <tr>
                        <th>ไอเทม</th>
                        <th>ราคา</th>
                        <th>ซื้อ</th>
                    </tr>
                </thead>
                <tbody id="price-data"></tbody>
            </table>
        </section>
    </div>

    <script>
        const gameData = {
            'VALORANT': [{i:'500 VP', p:'150.-'}, {i:'1000 VP', p:'295.-'}],
            'ROV': [{i:'20 คูปอง', p:'15.-'}, {i:'100 คูปอง', p:'75.-'}],
            'FREE FIRE': [{i:'100 Diamonds', p:'35.-'}, {i:'500 Diamonds', p:'160.-'}]
        };

        function updateView(gameName) {
            const section = document.getElementById('price-section');
            
            // ถ้าตารางแสดงอยู่แล้ว ให้ทำอนิเมชั่น "ลง" ก่อนแล้วค่อย "ขึ้น" ใหม่
            if (section.classList.contains('slide-up')) {
                section.classList.add('slide-down');
                
                setTimeout(() => {
                    renderTable(gameName);
                    section.classList.remove('slide-down');
                    // บังคับให้ Browser วาดใหม่ (Reflow) เพื่อเล่นอนิเมชั่นขึ้นใหม่
                    section.style.animation = 'none';
                    section.offsetHeight; 
                    section.style.animation = null;
                }, 400); // รอให้ Slide Down จบก่อน
            } else {
                renderTable(gameName);
                section.classList.add('slide-up');
            }
        }

        function renderTable(gameName) {
            const title = document.getElementById('selected-game-title');
            const tbody = document.getElementById('price-data');
            
            title.innerText = gameName;
            tbody.innerHTML = '';
            
            gameData[gameName].forEach(data => {
                tbody.innerHTML += `
                    <tr>
                        <td>${data.i}</td>
                        <td style="color:#e94560; font-weight:600;">${data.p}</td>
                        <td><button class="buy-btn" onclick="alert('กำลังไปหน้าชำระเงิน...')">BUY</button></td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
