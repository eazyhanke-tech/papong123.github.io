<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Topup - Pro Gamer Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background: #080a10; /* พื้นหลังเข้มขึ้น */
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            margin: 30px 0;
            text-align: center;
        }

        header h1 {
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        /* เมนูเลือกเกม */
        .game-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            background: #1a1f26;
            color: #aaa;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 20px; /* ปุ่มโค้งมนขึ้น */
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .nav-btn:hover {
            border-color: #e94560;
            color: #fff;
        }

        .nav-btn.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        /* พื้นที่แสดงคอนเทนต์ */
        .content-area {
            width: 90%;
            max-width: 650px;
            position: relative;
            margin-bottom: 50px;
        }

        /* Card แสดงราคาแบบมีรูป */
        .price-card {
            background: #11141a;
            border-radius: 20px;
            overflow: hidden; /* เพื่อให้รูปรักษาขอบโค้ง */
            border: 1px solid #21262d;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            
            /* อนิเมชั่นเริ่มต้น */
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            display: none;
        }

        /* อนิเมชั่นขาขึ้น (Active) */
        .price-card.show {
            display: block;
            animation: slideInSmooth 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        /* อนิเมชั่นขาลง (Exit) */
        .price-card.hide {
            display: block;
            animation: slideOutSmooth 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes slideInSmooth {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes slideOutSmooth {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-50px) scale(0.95); }
        }

        /* ส่วนแสดงรูปโปสเตอร์ */
        .poster-container {
            width: 100%;
            height: 250px; /* ปรับความสูงรูปได้ตรงนี้ */
            overflow: hidden;
            position: relative;
        }

        .poster-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ให้รูปเต็มพื้นที่โดยไม่เสียสัดส่วน */
            object-position: center; /* จัดกลางรูป */
            transition: 0.5s;
        }

        /* เพิ่ม Overlay สีดำจางๆ บนรูปเพื่อให้ข้อความเด่น */
        .poster-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(17,20,26,1), rgba(17,20,26,0));
        }

        /* ชื่อเกมบนรูป */
        .poster-title {
            position: absolute;
            bottom: 20px;
            left: 25px;
            margin: 0;
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* ส่วนตารางราคา */
        .table-container {
            padding: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: #888;
            font-weight: 300;
            padding-bottom: 15px;
            border-bottom: 1px solid #21262d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        td {
            padding: 18px 0;
            border-bottom: 1px solid #1a1f26;
        }

        .package-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
        }

        .package-price {
            font-weight: 600;
            color: #e94560;
            font-size: 1.1rem;
        }

        .buy-btn {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            float: right;
            transition: 0.3s;
        }

        .buy-btn:hover {
            box-shadow: 0 0 15px rgba(56, 239, 125, 0.4);
            transform: translateY(-2px);
        }

        /* รองรับมือถือ */
        @media (max-width: 600px) {
            .poster-container { height: 180px; }
            .poster-title { font-size: 1.5rem; }
            .nav-btn { padding: 8px 15px; font-size: 0.9rem; }
        }

    </style>
</head>
<body>

    <header>
        <h1>GG TOPUP CENTER</h1>
        <p>บริการเติมเกมรวดเร็ว ปลอดภัย ไร้กังวล</p>
    </header>

    <div class="game-nav">
        <button class="nav-btn" onclick="switchGame('VALORANT', this)">VALORANT</button>
        <button class="nav-btn" onclick="switchGame('ROV', this)">ROV</button>
        <button class="nav-btn" onclick="switchGame('FF', this)">FREE FIRE</button>
    </div>

    <div class="content-area">
        <div id="price-card" class="price-card">
            
            <div class="poster-container">
                <img id="game-poster" src="" alt="Game Poster">
                <div class="poster-overlay"></div>
                <h2 id="game-title" class="poster-title">Game Title</h2>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>แพ็คเกจ</th>
                            <th style="text-align: right;">ราคา / ดำเนินการ</th>
                        </tr>
                    </thead>
                    <tbody id="price-list">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูลเกม แพ็คเกจ และรูปภาพ
        // **สำคัญ: เปลี่ยนชื่อไฟล์รูปภาพให้ตรงกับที่น้องมี**
        const data = {
            'VALORANT': {
                poster: 'Valo.png', // ใส่ path รูปของน้องที่นี่
                packages: [{n: '500 VP', p: '150.-'}, {n: '1000 VP', p: '295.-'}, {n: '2500 VP', p: '720.-'}]
            },
            'ROV': {
                poster: 'rov_poster.jpg', // ใส่ path รูปของน้องที่นี่
                packages: [{n: '20 คูปอง', p: '15.-'}, {n: '100 คูปอง', p: '75.-'}, {n: '500 คูปอง', p: '340.-'}]
            },
            'FF': {
                poster: 'ff_poster.jpg', // ใส่ path รูปของน้องที่นี่
                packages: [{n: '100 Diamonds', p: '35.-'}, {n: '500 Diamonds', p: '160.-'}, {n: '1000 Diamonds', p: '315.-'}]
            }
        };

        let currentGame = '';

        function switchGame(game, btn) {
            if (currentGame === game) return; // ถ้ากดซ้ำเกมเดิมไม่ต้องทำอะไร
            
            const card = document.getElementById('price-card');
            
            // 1. จัดการปุ่ม Active
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // 2. ถ้ามีหน้าเปิดอยู่ ให้ทำอนิเมชั่นออก
            if (currentGame !== '') {
                card.classList.remove('show');
                card.classList.add('hide');
                
                // รอให้อนิเมชั่นออกจบ (500ms) แล้วค่อยเปลี่ยนข้อมูลและเอาหน้าใหม่ขึ้นมา
                setTimeout(() => {
                    renderData(game);
                    card.classList.remove('hide');
                    card.classList.add('show');
                }, 500);
            } else {
                // ครั้งแรกที่กด
                renderData(game);
                card.classList.add('show');
            }

            currentGame = game;
        }

        function renderData(game) {
            // อัปเดตชื่อเกมและรูปโปสเตอร์
            document.getElementById('game-title').innerText = game;
            document.getElementById('game-poster').src = data[game].poster;
            
            // อัปเดตตารางราคา
            const list = document.getElementById('price-list');
            list.innerHTML = '';
            data[game].packages.forEach(item => {
                list.innerHTML += `
                    <tr>
                        <td class="package-name">${item.n}</td>
                        <td style="text-align: right;">
                            <span class="package-price">${item.p}</span>
                            <button class="buy-btn" onclick="checkout('${game}', '${item.n}')">ซื้อเลย</button>
                        </td>
                    </tr>
                `;
            });
        }

        function checkout(game, package) {
            alert(`กำลังไปหน้าชำระเงินสำหรับ ${game} - ${package}`);
        }
    </script>
</body>
</html>
